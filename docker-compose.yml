services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: novel-creator
    container_name: novel-creator
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./books:/app/books
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-deepseek-reasoner}
      - DATABASE_URL=sqlite:///./data/novel.db
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M

