<div>
  <h2 class="text-xl font-bold mb-4">添加新章节</h2>

  <div class="alert alert-info mb-4">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="stroke-current shrink-0 w-6 h-6">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
    </svg>
    <span>插入新章节后，后续章节将自动重新编号。填写标题和核心事件后，可以使用 AI 优化提纲。</span>
  </div>

  <div id="optimize-status" class="hidden mb-4"></div>

  <form
    hx-post="/books/{{ book.id }}/chapters/add"
    hx-target="#chapter-list"
    hx-swap="outerHTML"
  >
    <div class="form-control mb-4">
      <label class="label">
        <span class="label-text">插入位置</span>
      </label>
      <select name="position" class="select" id="chapter-position">
        {% for i in range(1, max_num + 2) %}
          <option value="{{ i }}" {% if i == position %}selected{% endif %}>
            第 {{ i }} 章位置
            {% if i <= max_num %}（在现有章节中插入）{% else %}（在末尾添加）{% endif %}
          </option>
        {% endfor %}
      </select>
    </div>

    <div class="form-control mb-4">
      <label class="label">
        <span class="label-text">章节标题</span>
      </label>
      <input
        type="text"
        name="title"
        id="chapter-title"
        class="input"
        placeholder="例如：意外的相遇"
        required
      />
    </div>

    <div class="form-control mb-4">
      <label class="label">
        <span class="label-text">核心事件（可选）</span>
      </label>
      <textarea
        name="core_event"
        id="chapter-core-event"
        rows="3"
        class="textarea"
        placeholder="例如：主角在森林中遇到神秘老人，获得一本古老的修炼秘籍..."
      ></textarea>
    </div>

    <div class="form-control mt-4 flex flex-row gap-2">
      <button type="submit" class="btn btn-primary">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
        </svg>
        添加章节
      </button>
      <button type="button" class="btn btn-secondary" onclick="optimizeOutline()" id="optimize-outline-btn">
        <span id="optimize-outline-loading" class="loading loading-xs hidden"></span>
        <span id="optimize-outline-text">AI 优化提纲</span>
      </button>
      <button type="button" class="btn btn-ghost" hx-on="click: history.back()">
        取消
      </button>
    </div>
  </form>
</div>

<script>
  function optimizeOutline() {
    const btn = document.getElementById('optimize-outline-btn');
    const loading = document.getElementById('optimize-outline-loading');
    const btnText = document.getElementById('optimize-outline-text');
    const status = document.getElementById('optimize-status');
    const bookId = {{ book.id }};
    const position = document.getElementById('chapter-position').value;
    const titleInput = document.getElementById('chapter-title');
    const coreEventInput = document.getElementById('chapter-core-event');
    const title = titleInput.value.trim();
    const coreEvent = coreEventInput.value.trim();

    if (!title) {
      status.textContent = '请先填写章节标题';
      status.className = 'alert alert-warning mb-4';
      status.classList.remove('hidden');
      return;
    }

    startRequest();
    btn.disabled = true;
    loading.classList.remove('hidden');
    btnText.textContent = '优化中...';
    status.textContent = '正在 AI 优化提纲...';
    status.className = 'alert alert-info mb-4';
    status.classList.remove('hidden');

    fetch(`/books/${bookId}/chapters/optimize-outline`, {
      method: "POST",
      headers: {
        "Content-Type": "application/x-www-form-urlencoded",
      },
      body: new URLSearchParams({
        book_id: String(bookId),
        position: position,
        title: title,
        core_event: coreEvent,
      }),
    })
      .then((response) => response.json())
      .then((data) => {
        if (data.title) {
          titleInput.value = data.title;
        }
        if (data.core_event) {
          coreEventInput.value = data.core_event;
        }
        if (data.error) {
          status.textContent = 'AI 优化失败: ' + data.error + '，已保留你的原始输入';
          status.className = 'alert alert-error mb-4';
        } else {
          status.textContent = 'AI 优化完成！请查看优化后的标题和核心事件。';
          status.className = 'alert alert-success mb-4';
        }
        btn.disabled = false;
        loading.classList.add('hidden');
        btnText.textContent = 'AI 优化提纲';
        endRequest();
      })
      .catch((error) => {
        status.textContent = 'AI 优化失败: ' + error.message + '，已保留你的原始输入';
        status.className = 'alert alert-error mb-4';
        btn.disabled = false;
        loading.classList.add('hidden');
        btnText.textContent = 'AI 优化提纲';
        endRequest();
      });
  }
</script>
