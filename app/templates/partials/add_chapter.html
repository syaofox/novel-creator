<div>
  <h2 class="text-xl font-bold mb-4">添加新章节</h2>

  <div class="alert alert-info mb-4">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="stroke-current shrink-0 w-6 h-6">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
    </svg>
    <span>插入新章节后，后续章节将自动重新编号。</span>
  </div>

  <form
    hx-post="/books/{{ book.id }}/chapters/add"
    hx-target="#chapter-list"
    hx-swap="outerHTML"
  >
    <div class="form-control mb-4">
      <label class="label">
        <span class="label-text">插入位置</span>
      </label>
      <select name="position" class="select select-bordered">
        {% for i in range(1, max_num + 2) %}
          <option value="{{ i }}" {% if i == position %}selected{% endif %}>
            第 {{ i }} 章位置
            {% if i <= max_num %}（在现有章节中插入）{% else %}（在末尾添加）{% endif %}
          </option>
        {% endfor %}
      </select>
    </div>

    <div class="form-control mb-4">
      <label class="label">
        <span class="label-text">章节标题</span>
      </label>
      <input
        type="text"
        name="title"
        class="input input-bordered"
        placeholder="例如：意外的相遇"
        required
      />
    </div>

    <div class="form-control mb-4">
      <label class="label">
        <span class="label-text">核心事件（可选）</span>
      </label>
      <textarea
        name="core_event"
        rows="3"
        class="textarea textarea-bordered"
        placeholder="例如：主角在森林中遇到神秘老人，获得一本古老的修炼秘籍..."
      ></textarea>
    </div>

    <div class="form-control mt-4">
      <button type="submit" class="btn btn-primary">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
        </svg>
        添加章节
      </button>
      <button type="button" class="btn btn-ghost mt-2" hx-on="click: history.back()">
        取消
      </button>
    </div>
  </form>
</div>
