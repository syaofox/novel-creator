<div class="alert alert-success">
  <div>
    {% if regenerate %}
      <span>第{{ chapter_number }}章重新生成成功！请审核并编辑内容，然后保存。</span>
    {% else %}
      <span>第{{ chapter_number }}章生成成功！请审核并编辑内容，然后保存。</span>
    {% endif %}
    {% if stream %}
    <div class="mt-2">
      <div id="stream-status" class="text-sm text-blue-600">正在流式生成内容...</div>
    </div>
    {% endif %}
  </div>
</div>

<div class="form-control mb-4">
  <label class="label">
    <span class="label-text">章节标题</span>
  </label>
  <input type="text" class="input" value="{{ title }}" readonly />
</div>

<div class="form-control mb-4">
  <label class="label">
    <span class="label-text">本章核心事件</span>
  </label>
  <textarea
    readonly
    rows="3"
    class="textarea bg-gray-50"
  >{{ core_event }}</textarea>
</div>

<div class="form-control mb-4">
  <label class="label">
    <span class="label-text">上一章结尾（参考）</span>
  </label>
  <textarea
    readonly
    rows="4"
    class="textarea bg-gray-50"
  >{{ prev_ending }}</textarea>
</div>

<div class="mt-4">
  <form
    hx-post="/books/{{ book.id }}/chapters/save"
    hx-target="#main-workspace"
    hx-swap="innerHTML"
  >
    <input type="hidden" name="chapter_number" value="{{ chapter_number }}">
    <input type="hidden" name="title" value="{{ title }}">
    <div class="form-control">
      <label class="label">
        <span class="label-text">章节内容</span>
        <span id="word-count" class="label-text-alt text-base-content/50">{{ content|length }}字</span>
      </label>
      <textarea
        id="chapter-content"
        name="content"
        rows="30"
        class="textarea font-mono whitespace-pre-wrap"
        placeholder="章节内容..."
        oninput="document.getElementById('word-count').textContent = this.value.length + '字'"
      >{{ content }}</textarea>
    </div>
    <div class="form-control mt-4">
      <button type="submit" class="btn btn-primary">保存章节</button>
      <button type="button" class="btn btn-ghost" hx-on="click: history.back()">
        取消
      </button>
    </div>
  </form>
</div>
{% if stream %}
<script>
  (function() {
    const textarea = document.getElementById('chapter-content');
    const statusEl = document.getElementById('stream-status');
    const bookId = {{ book.id }};
    const chapterNumber = {{ chapter_number }};
    const coreEvent = {{ core_event|tojson }};
    const chapterTitle = {{ title|tojson }};

    function startStreaming() {
      startRequest();
      statusEl.textContent = '开始生成...';

      fetch(`/books/${bookId}/chapters/stream`, {
        method: "POST",
        headers: {
          "Content-Type": "application/x-www-form-urlencoded",
        },
        body: new URLSearchParams({
          book_id: String(bookId),
          chapter_number: String(chapterNumber),
          core_event: coreEvent,
          title: chapterTitle,
        }),
      })
        .then((response) => {
          const reader = response.body.getReader();
          const decoder = new TextDecoder();

          function read() {
            reader.read().then(({ done, value }) => {
              if (done) {
                statusEl.textContent = '流式生成完成。';
                statusEl.className = 'text-sm text-green-600';
                endRequest();
                return;
              }

              const chunk = decoder.decode(value, { stream: true });
              const lines = chunk.split("\n").filter((line) => line.trim());

              lines.forEach((line) => {
                try {
                  const data = JSON.parse(line);

                  if (data.done) {
                    statusEl.textContent = '流式生成完成。';
                    statusEl.className = 'text-sm text-green-600';
                    endRequest();
                    return;
                  }

                  if (data.error) {
                    statusEl.textContent = '流式生成失败: ' + data.error;
                    statusEl.className = 'text-sm text-red-600';
                    endRequest();
                    return;
                  }

                  if (data.content) {
                    textarea.value += data.content;
                    textarea.scrollTop = textarea.scrollHeight;
                  }
                } catch (e) {
                  console.warn("Failed to parse line:", line);
                }
              });

              read();
            });
          }

          read();
        })
        .catch((error) => {
          console.error("Stream error:", error);
          statusEl.textContent = '流式生成失败: ' + error.message;
          statusEl.className = 'text-sm text-red-600';
          endRequest();
        });
    }

    setTimeout(startStreaming, 100);
  })();
</script>
{% endif %}
