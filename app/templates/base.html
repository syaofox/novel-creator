<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeepSeek 长篇小说创作平台</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.css"
      rel="stylesheet"
      type="text/css"
    />
  </head>
  <body class="bg-base-200 min-h-screen">
    <script>
      let pendingRequestCount = 0;

      function startRequest() {
        pendingRequestCount++;
      }

      function endRequest() {
        pendingRequestCount = Math.max(0, pendingRequestCount - 1);
      }

      window.onbeforeunload = function () {
        if (pendingRequestCount > 0) {
          return "有请求正在进行中，确定要离开吗？";
        }
      };
    </script>
    <div class="navbar bg-base-100 shadow-lg mb-4">
      <div class="flex-1">
        <a href="/" class="btn btn-ghost text-xl">DeepSeek Novel Studio</a>
      </div>
      <div class="flex-none">
        <ul class="menu menu-horizontal px-1">
          <li><a href="/books/new" hx-boost="true">新建小说</a></li>
          <li><a href="/materials">素材管理</a></li>
          <li><a href="#">写作指南</a></li>
          <li><a href="/settings/global">全局设置</a></li>
        </ul>
      </div>
    </div>
    <main class="container mx-auto p-4" id="main-content">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
