<!doctype html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📖</text></svg>" />
    <title>DeepSeek 长篇小说创作平台</title>
    <link href="/static/css/tailwind.min.css" rel="stylesheet" type="text/css" />
    <script src="/static/js/htmx.min.js"></script>
    <script>
      window.pendingRequestCount = window.pendingRequestCount || 0;

      function startRequest() {
        window.pendingRequestCount++;
      }

      function endRequest() {
        window.pendingRequestCount = Math.max(0, window.pendingRequestCount - 1);
      }

      window.onbeforeunload = function () {
        if (window.pendingRequestCount > 0) {
          return "有请求正在进行中，确定要离开吗？";
        }
      };

      htmx.on("htmx:afterSwap", function (evt) {
        evt.target.querySelectorAll("input, select, textarea").forEach(function (el) {
          if (!el.id && el.name) {
            el.id = el.name;
          }
        });
      });
    </script>
  </head>
  <body>
    <div class="navbar bg-base-100 shadow-lg mb-4">
      <div class="flex-1">
        <a href="/" class="btn btn-ghost text-xl">DeepSeek Novel Studio</a>
      </div>
      <div class="flex-none">
        <ul class="menu menu-horizontal px-1">
          <li><a href="/books/new" hx-boost="true">新建小说</a></li>
          <li><a href="/materials">素材管理</a></li>
          <li><a href="#">写作指南</a></li>
          <li><a href="/settings/global">全局设置</a></li>
        </ul>
      </div>
    </div>
    <main class="container mx-auto p-4" id="main-content">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
