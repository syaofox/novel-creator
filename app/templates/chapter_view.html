{% extends "base.html" %}
{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="card bg-base-100 shadow-xl">
        <div class="card-body">
            <h1 class="card-title text-3xl">{{ chapter.title }}</h1>
            <p class="text-sm text-gray-500">第{{ chapter.chapter_number }}章 · {{ chapter.created_at }}</p>
            <div class="divider"></div>
            <div class="prose max-w-none">
                <pre style="white-space: pre-wrap; font-family: inherit;">{{ content }}</pre>
            </div>
            <div class="card-actions justify-end mt-4">
                <a href="/books/{{ book.id }}" class="btn btn-ghost">返回</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
