<div>
  <script>
    document.addEventListener("htmx:beforeRequest", function (evt) {
      startRequest();
    });
    document.addEventListener("htmx:afterRequest", function (evt) {
      endRequest();
    });
  </script>
  <h2 class="text-xl font-bold mb-4">
    {% if editing %}
      编辑第 {{ chapter_number }} 章
    {% elif regenerate %}
      重新生成第 {{ chapter_number }} 章
    {% else %}
      写第 {{ chapter_number }} 章
    {% endif %}
  </h2>

  {% if editing %}
    <div class="alert alert-warning mb-4">
      <div>
        <span>你正在重新编辑已完成的章节。保存后将覆盖原内容。</span>
      </div>
    </div>
    <div class="form-control mb-4">
      <label class="label">
        <span class="label-text">章节标题</span>
      </label>
      <input type="text" name="title" class="input" value="{{ title }}" placeholder="章节标题" />
    </div>
    <div class="form-control mb-4">
      <label class="label">
        <span class="label-text">本章核心事件</span>
      </label>
      <textarea name="core_event" rows="3" class="textarea" placeholder="本章核心事件">{{ core_event }}</textarea>
    </div>
    <div class="form-control mb-4">
      <label class="label">
        <span class="label-text">上一章结尾（参考）</span>
      </label>
      <textarea readonly rows="4" class="textarea bg-gray-50">{{ prev_ending }}</textarea>
    </div>
    <form
      hx-post="/books/{{ book.id }}/chapters/save"
      hx-target="#main-workspace"
      hx-swap="innerHTML"
    >
      <input type="hidden" name="chapter_number" value="{{ chapter_number }}" />
      <input type="hidden" name="title" value="" />
      <div class="form-control">
        <label class="label"> <span class="label-text">章节内容</span> </label>
        <textarea
          name="content"
          rows="30"
          class="textarea font-mono whitespace-pre-wrap"
          placeholder="章节内容..."
        >{{ existing_content }}</textarea>
      </div>
      <div class="form-control mt-4">
        <button type="submit" class="btn btn-primary">保存修改</button>
        <button type="button" class="btn btn-ghost" hx-on="click: history.back()">
          取消
        </button>
      </div>
    </form>
  {% else %}
    <form
      hx-post="/books/{{ book.id }}/chapters/"
      hx-target="#main-workspace"
      hx-swap="innerHTML"
    >
      <input type="hidden" name="chapter_number" value="{{ chapter_number }}" />
      {% if regenerate %}<input type="hidden" name="regenerate" value="true" />{% endif %}

      <div id="optimize-status" class="hidden mb-4"></div>

      <div class="form-control mb-4">
        <label class="label">
          <span class="label-text">章节标题（可选）</span>
        </label>
        <input
          type="text"
          name="title"
          id="chapter-title"
          class="input"
          value="{{ title }}"
          placeholder="例如：意外的相遇"
        />
      </div>
      <div class="form-control mb-4">
        <label class="label">
          <span class="label-text">本章核心事件</span>
        </label>
        <textarea
          name="core_event"
          id="chapter-core-event"
          rows="3"
          class="textarea"
          placeholder="例如：主角遇到神秘老人，获得传承..."
        >{{ core_event }}</textarea>
      </div>
      <div class="form-control mb-4">
        <label class="label">
          <span class="label-text">上一章结尾（参考）</span>
        </label>
        <textarea readonly rows="4" class="textarea bg-gray-100">{{ prev_ending }}</textarea>
      </div>
      <div class="form-control mt-4 flex flex-row gap-2">
        <button type="submit" class="btn btn-primary">
          {% if regenerate %}重新生成{% else %}生成章节{% endif %}
        </button>
        <button type="button" class="btn btn-secondary" onclick="optimizeOutline()" id="optimize-outline-btn">
          <span id="optimize-outline-loading" class="loading loading-xs hidden"></span>
          <span id="optimize-outline-text">AI 优化提纲</span>
        </button>
        <button type="button" class="btn btn-ghost" hx-on="click: history.back()">
          取消
        </button>
      </div>
    </form>

    <script>
      function optimizeOutline() {
        const btn = document.getElementById('optimize-outline-btn');
        const loading = document.getElementById('optimize-outline-loading');
        const btnText = document.getElementById('optimize-outline-text');
        const status = document.getElementById('optimize-status');
        const bookId = {{ book.id }};
        const titleInput = document.getElementById('chapter-title');
        const coreEventInput = document.getElementById('chapter-core-event');
        const title = titleInput.value.trim();
        const coreEvent = coreEventInput.value.trim();

        if (!title) {
          status.textContent = '请先填写章节标题';
          status.className = 'alert alert-warning mb-4';
          status.classList.remove('hidden');
          return;
        }

        startRequest();
        btn.disabled = true;
        loading.classList.remove('hidden');
        btnText.textContent = '优化中...';
        status.textContent = '正在 AI 优化提纲...';
        status.className = 'alert alert-info mb-4';
        status.classList.remove('hidden');

        fetch(`/books/${bookId}/chapters/optimize-outline`, {
          method: "POST",
          headers: {
            "Content-Type": "application/x-www-form-urlencoded",
          },
          body: new URLSearchParams({
            book_id: String(bookId),
            position: String({{ chapter_number }}),
            title: title,
            core_event: coreEvent,
          }),
        })
          .then((response) => response.json())
          .then((data) => {
            if (data.title) {
              titleInput.value = data.title;
            }
            if (data.core_event) {
              coreEventInput.value = data.core_event;
            }
            if (data.error) {
              status.textContent = 'AI 优化失败: ' + data.error + '，已保留你的原始输入';
              status.className = 'alert alert-error mb-4';
            } else {
              status.textContent = 'AI 优化完成！请查看优化后的标题和核心事件。';
              status.className = 'alert alert-success mb-4';
            }
            btn.disabled = false;
            loading.classList.add('hidden');
            btnText.textContent = 'AI 优化提纲';
            endRequest();
          })
          .catch((error) => {
            status.textContent = 'AI 优化失败: ' + error.message + '，已保留你的原始输入';
            status.className = 'alert alert-error mb-4';
            btn.disabled = false;
            loading.classList.add('hidden');
            btnText.textContent = 'AI 优化提纲';
            endRequest();
          });
      }
    </script>
  {% endif %}
</div>
