{% extends "base.html" %}
{% block content %}
  <div class="max-w-4xl mx-auto">
    <h1 class="text-2xl font-bold mb-4">预览并确认小说设定</h1>
    <div id="streamStatus" class="hidden alert alert-info mb-4">
      <span class="loading loading-spinner"></span>
      <span>AI 正在生成中...</span>
    </div>
    <div id="rawOutput" class="hidden card bg-base-100 shadow-xl mb-4">
      <div class="card-body">
        <h2 class="card-title text-sm">AI 原始输出（实时）</h2>
        <textarea
          id="rawContent"
          class="textarea textarea-bordered text-xs font-mono"
          rows="6"
        ></textarea>
        <button
          type="button"
          class="btn btn-sm btn-outline mt-2"
          onclick="manualParse()"
        >
          手动解析
        </button>
      </div>
    </div>

    <form action="/books" method="post" class="space-y-4">
      <input type="hidden" name="title" value="{{ title }}" />
      <input type="hidden" name="genre" value="{{ genre }}" />
      <input
        type="hidden"
        name="target_chapters"
        value="{{ target_chapters }}"
      />
      <input type="hidden" name="basic_idea" value="{{ basic_idea }}" />
      <input type="hidden" name="temperature" value="{{ temperature }}" />
      <input type="hidden" name="top_p" value="{{ top_p }}" />
      <input type="hidden" name="max_tokens" value="{{ max_tokens }}" />
      <input type="hidden" name="stream" value="{{ 'on' if stream else '' }}" />
      <input
        type="hidden"
        name="jailbreak_prefix"
        value="{{ jailbreak_prefix }}"
      />
      <input
        type="hidden"
        name="system_template"
        value="{{ system_template }}"
      />

      <div class="card bg-base-100 shadow-xl">
        <div class="card-body">
          <h2 class="card-title">基本信息</h2>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="label"
                ><span class="label-text font-bold">书名</span></label
              >
              <input
                type="text"
                name="title"
                id="title"
                value="{{ title }}"
                class="input input-bordered w-full"
                placeholder="输入书名"
              />
              <div id="suggestedTitle" class="hidden mt-1">
                <span class="text-xs text-gray-500">AI 建议：</span>
                <button
                  type="button"
                  class="btn btn-xs btn-ghost text-primary"
                  onclick="useSuggestedTitle()"
                ></button>
              </div>
            </div>
            <div>
              <label class="label"
                ><span class="label-text font-bold">类型</span></label
              >
              <div class="py-2">{{ genre }}</div>
            </div>
            <div>
              <label class="label"
                ><span class="label-text font-bold">目标章节数</span></label
              >
              <div class="py-2">{{ target_chapters }}</div>
            </div>
          </div>
          <div class="mt-2">
            <label class="label"
              ><span class="label-text font-bold">初始创意</span></label
            >
            <div
              class="whitespace-pre-wrap text-sm mt-1 bg-base-200 p-3 rounded"
            >
              {{ basic_idea }}
            </div>
          </div>
        </div>
      </div>

      <div class="card bg-base-100 shadow-xl">
        <div class="card-body">
          <h2 class="card-title">人物卡</h2>
          <div id="characters-container" class="space-y-4"></div>
          <textarea name="characters" id="characters" class="hidden"></textarea>
        </div>
      </div>

      <div class="card bg-base-100 shadow-xl">
        <div class="card-body">
          <h2 class="card-title">世界观</h2>
          <div class="grid grid-cols-1 gap-3">
            <div>
              <label class="label"><span class="label-text">设定</span></label>
              <textarea
                id="world_setting"
                rows="3"
                class="textarea textarea-bordered w-full"
                placeholder="世界观设定"
              ></textarea>
            </div>
            <div>
              <label class="label"
                ><span class="label-text">特殊规则</span></label
              >
              <textarea
                id="world_special_rules"
                rows="2"
                class="textarea textarea-bordered w-full"
                placeholder="特殊规则"
              ></textarea>
            </div>
            <div>
              <label class="label"><span class="label-text">主题</span></label>
              <textarea
                id="world_themes"
                rows="2"
                class="textarea textarea-bordered w-full"
                placeholder="主题"
              ></textarea>
            </div>
          </div>
          <textarea name="world_view" id="world_view" class="hidden"></textarea>
        </div>
      </div>

      <div class="card bg-base-100 shadow-xl">
        <div class="card-body">
          <h2 class="card-title">风格规范</h2>
          <div class="grid grid-cols-1 gap-3">
            <div>
              <label class="label"
                ><span class="label-text">叙事视角</span></label
              >
              <input
                type="text"
                id="style_perspective"
                class="input input-bordered w-full"
                placeholder="叙事视角"
              />
            </div>
            <div>
              <label class="label"
                ><span class="label-text">语言风格</span></label
              >
              <textarea
                id="style_language"
                rows="2"
                class="textarea textarea-bordered w-full"
                placeholder="语言风格"
              ></textarea>
            </div>
            <div>
              <label class="label"
                ><span class="label-text">节奏特点</span></label
              >
              <input
                type="text"
                id="style_pace"
                class="input input-bordered w-full"
                placeholder="节奏特点"
              />
            </div>
            <div>
              <label class="label"
                ><span class="label-text">目标读者</span></label
              >
              <input
                type="text"
                id="style_audience"
                class="input input-bordered w-full"
                placeholder="目标读者"
              />
            </div>
          </div>
          <textarea name="style" id="style" class="hidden"></textarea>
        </div>
      </div>

      <div class="card bg-base-100 shadow-xl">
        <div class="card-body">
          <h2 class="card-title">主线大纲</h2>
          <p class="text-sm text-gray-500 mb-2">编辑每章的标题和核心事件</p>
          <div class="space-y-3">
            {% for ch in chapter_list %}
              <div class="border rounded p-3 bg-base-200">
                <div class="font-bold mb-2">第{{ ch.chapter }}章</div>
                <div class="grid grid-cols-1 gap-2">
                  <input
                    type="hidden"
                    name="chapter_num"
                    value="{{ ch.chapter }}"
                  />
                  <input
                    type="text"
                    name="chapter_title"
                    value="{{ ch.title }}"
                    placeholder="章节标题"
                    class="input input-bordered w-full"
                  />
                  <textarea
                    name="chapter_core_event"
                    rows="2"
                    placeholder="本章核心事件"
                    class="textarea textarea-bordered w-full"
                  >
{{ ch.core_event }}</textarea
                  >
                </div>
              </div>
            {% endfor %}
          </div>
          <textarea name="outline" class="hidden">{{ outline }}</textarea>
        </div>
      </div>

      <div class="card bg-base-100 shadow-xl">
        <div class="card-body">
          <h2 class="card-title">伏笔清单</h2>
          <div id="foreshadowing-list" class="space-y-2"></div>
          <textarea
            name="foreshadowing"
            id="foreshadowing"
            class="hidden"
          ></textarea>
        </div>
      </div>

      <div class="card bg-base-100 shadow-xl">
        <div class="card-body">
          <h2 class="card-title">其他信息</h2>
          <div class="grid grid-cols-1 gap-3">
            <div>
              <label class="label"
                ><span class="label-text">关键要点</span></label
              >
              <textarea
                id="other_key_points"
                rows="3"
                class="textarea textarea-bordered w-full"
                placeholder="关键要点"
              ></textarea>
            </div>
            <div>
              <label class="label"
                ><span class="label-text">写作指导</span></label
              >
              <textarea
                id="other_writing_guidance"
                rows="3"
                class="textarea textarea-bordered w-full"
                placeholder="写作指导"
              ></textarea>
            </div>
          </div>
          <textarea name="other" id="other" class="hidden"></textarea>
        </div>
      </div>

      <div class="flex gap-4">
        <a href="/books/new" class="btn btn-outline">返回修改</a>
        <button
          type="button"
          class="btn btn-primary"
          onclick="validateAndSubmit()"
        >
          确认创建
        </button>
      </div>
    </form>

    <form action="/books/preview" method="post" class="mt-4">
      <input type="hidden" name="title" value="{{ title }}" />
      <input type="hidden" name="genre" value="{{ genre }}" />
      <input
        type="hidden"
        name="target_chapters"
        value="{{ target_chapters }}"
      />
      <input type="hidden" name="basic_idea" value="{{ basic_idea }}" />
      <input type="hidden" name="temperature" value="{{ temperature }}" />
      <input type="hidden" name="top_p" value="{{ top_p }}" />
      <input type="hidden" name="max_tokens" value="{{ max_tokens }}" />
      <input type="hidden" name="stream" value="{{ 'on' if stream else '' }}" />
      <input
        type="hidden"
        name="jailbreak_prefix"
        value="{{ jailbreak_prefix }}"
      />
      <input
        type="hidden"
        name="system_template"
        value="{{ system_template }}"
      />
      <input type="hidden" name="style" value="{{ style }}" />
      <input type="hidden" name="characters" value="{{ characters }}" />
      <input type="hidden" name="world_view" value="{{ world_view }}" />
      <input
        type="hidden"
        name="outline"
        id="regen-outline"
        value="{{ outline }}"
      />
      <input type="hidden" name="foreshadowing" value="{{ foreshadowing }}" />
      <input type="hidden" name="other" value="{{ other }}" />
      <button type="button" class="btn btn-secondary" onclick="regenerate()">
        重新生成
      </button>
    </form>

    <script>
      function parseInitResult(fullText) {
        console.log("Parsing content:", fullText.substring(0, 500));

        const tryParse = (textToParse) => {
          const toString = (val) => {
            if (typeof val === "string") return val;
            if (typeof val === "object") return JSON.stringify(val, null, 2);
            return String(val);
          };
          const jsonData = JSON.parse(textToParse);
          return {
            characters: jsonData.characters || [],
            world_view: jsonData.world_view || jsonData.worldview || {},
            style: jsonData.style || {},
            outline: jsonData.outline || [],
            foreshadowing: jsonData.foreshadowing || [],
            other: jsonData.other || {},
            _raw: {
              characters: toString(jsonData.characters),
              world_view: toString(jsonData.world_view || jsonData.worldview),
              style: toString(jsonData.style),
              outline: jsonData.outline ? JSON.stringify(jsonData.outline) : "",
              foreshadowing: toString(jsonData.foreshadowing),
              other: toString(jsonData.other),
            },
          };
        };

        let jsonText = fullText;
        const jsonCodeBlockMatch = fullText.match(/```json\s*([\s\S]*?)```/i);
        if (jsonCodeBlockMatch && jsonCodeBlockMatch[1]) {
          console.log("Found JSON code block, extracting...");
          jsonText = jsonCodeBlockMatch[1].trim();
          try {
            return tryParse(jsonText);
          } catch (e) {
            console.log("JSON code block parse failed:", e);
          }
        }

        console.log("No JSON code block, trying to extract JSON from text...");
        const startIdx = fullText.indexOf("{");
        const lastIdx = fullText.lastIndexOf("}");
        if (startIdx !== -1 && lastIdx !== -1 && lastIdx > startIdx) {
          jsonText = fullText.substring(startIdx, lastIdx + 1);
          console.log("Extracted JSON text:", jsonText.substring(0, 200));
          try {
            return tryParse(jsonText);
          } catch (e) {
            console.log("Extracted JSON parse failed:", e);
          }
        }

        console.log("No JSON found, returning empty result");
        return {
          characters: [],
          world_view: {},
          style: {},
          outline: [],
          foreshadowing: [],
          other: {},
          _raw: {},
        };
      }

      function renderCharacterCards(characters) {
        const container = document.getElementById("characters-container");
        container.innerHTML = "";
        if (!Array.isArray(characters)) {
          return;
        }
        characters.forEach((char, idx) => {
          const card = document.createElement("div");
          card.className = "border rounded-lg p-4 bg-base-200";
          card.innerHTML = `
            <div class="flex justify-between items-center mb-3">
              <span class="font-bold text-lg">角色 ${idx + 1}</span>
              <button type="button" class="btn btn-sm btn-ghost text-error" onclick="removeCharacterCard(${idx})">删除</button>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="label py-1"><span class="label-text-alt">姓名</span></label>
                <input type="text" class="input input-sm input-bordered w-full" data-char-field="name" value="${escapeHtml(char.name || "")}" placeholder="姓名">
              </div>
              <div>
                <label class="label py-1"><span class="label-text-alt">昵称</span></label>
                <input type="text" class="input input-sm input-bordered w-full" data-char-field="nickname" value="${escapeHtml(char.nickname || "")}" placeholder="昵称">
              </div>
              <div>
                <label class="label py-1"><span class="label-text-alt">年龄</span></label>
                <input type="text" class="input input-sm input-bordered w-full" data-char-field="age" value="${char.age || ""}" placeholder="年龄">
              </div>
              <div>
                <label class="label py-1"><span class="label-text-alt">人物关系</span></label>
                <input type="text" class="input input-sm input-bordered w-full" data-char-field="relationships" value="${escapeHtml(char.relationships || "")}" placeholder="人物关系">
              </div>
              <div class="col-span-2">
                <label class="label py-1"><span class="label-text-alt">外貌描述</span></label>
                <textarea class="textarea textarea-sm textarea-bordered w-full" data-char-field="appearance" rows="2" placeholder="外貌描述">${escapeHtml(char.appearance || "")}</textarea>
              </div>
              <div class="col-span-2">
                <label class="label py-1"><span class="label-text-alt">性格特点</span></label>
                <textarea class="textarea textarea-sm textarea-bordered w-full" data-char-field="personality" rows="2" placeholder="性格特点">${escapeHtml(char.personality || "")}</textarea>
              </div>
              <div class="col-span-2">
                <label class="label py-1"><span class="label-text-alt">背景故事</span></label>
                <textarea class="textarea textarea-sm textarea-bordered w-full" data-char-field="background" rows="2" placeholder="背景故事">${escapeHtml(char.background || "")}</textarea>
              </div>
              <div class="col-span-2">
                <label class="label py-1"><span class="label-text-alt">角色目标</span></label>
                <textarea class="textarea textarea-sm textarea-bordered w-full" data-char-field="goal" rows="2" placeholder="角色目标">${escapeHtml(char.goal || "")}</textarea>
              </div>
            </div>
          `;
          container.appendChild(card);
        });
        if (characters.length === 0) {
          container.innerHTML =
            '<p class="text-gray-500 text-sm">暂无人物信息</p>';
        }
      }

      function addCharacterCard() {
        const current = getCharactersFromUI();
        current.push({});
        renderCharacterCards(current);
      }

      function removeCharacterCard(idx) {
        const current = getCharactersFromUI();
        current.splice(idx, 1);
        renderCharacterCards(current);
      }

      function getCharactersFromUI() {
        const cards = document.querySelectorAll(
          "#characters-container > div.border",
        );
        const characters = [];
        cards.forEach((card) => {
          const char = {};
          card.querySelectorAll("[data-char-field]").forEach((el) => {
            char[el.dataset.charField] = el.value;
          });
          characters.push(char);
        });
        return characters;
      }

      function renderWorldView(worldView) {
        if (typeof worldView !== "object" || !worldView) return;
        document.getElementById("world_setting").value =
          worldView.setting || "";
        document.getElementById("world_special_rules").value =
          worldView.special_rules || "";
        document.getElementById("world_themes").value = Array.isArray(
          worldView.themes,
        )
          ? worldView.themes.join("\n")
          : worldView.themes || "";
      }

      function getWorldViewFromUI() {
        return {
          setting: document.getElementById("world_setting").value,
          special_rules: document.getElementById("world_special_rules").value,
          themes: document
            .getElementById("world_themes")
            .value.split("\n")
            .filter((t) => t.trim()),
        };
      }

      function renderStyle(style) {
        if (typeof style !== "object" || !style) return;
        document.getElementById("style_perspective").value =
          style.narrative_perspective || "";
        document.getElementById("style_language").value =
          style.language_style || "";
        document.getElementById("style_pace").value = style.pace || "";
        document.getElementById("style_audience").value =
          style.target_audience || "";
      }

      function getStyleFromUI() {
        return {
          narrative_perspective:
            document.getElementById("style_perspective").value,
          language_style: document.getElementById("style_language").value,
          pace: document.getElementById("style_pace").value,
          target_audience: document.getElementById("style_audience").value,
        };
      }

      function renderForeshadowing(foreshadowing) {
        const container = document.getElementById("foreshadowing-list");
        container.innerHTML = "";
        const items = Array.isArray(foreshadowing) ? foreshadowing : [];
        items.forEach((item, idx) => {
          const row = document.createElement("div");
          row.className = "flex gap-2";
          row.innerHTML = `
            <input type="text" class="input input-sm input-bordered flex-1" data-foreshadowing-idx="${idx}" value="${escapeHtml(typeof item === "string" ? item : "")}" placeholder="伏笔">
            <button type="button" class="btn btn-sm btn-ghost text-error" onclick="removeForeshadowingItem(${idx})">×</button>
          `;
          container.appendChild(row);
        });
        const addBtn = document.createElement("button");
        addBtn.type = "button";
        addBtn.className = "btn btn-sm btn-outline";
        addBtn.textContent = "+ 添加伏笔";
        addBtn.onclick = addForeshadowingItem;
        container.appendChild(addBtn);
      }

      function addForeshadowingItem() {
        const container = document.getElementById("foreshadowing-list");
        const idx = container.querySelectorAll(
          "[data-foreshadowing-idx]",
        ).length;
        const row = document.createElement("div");
        row.className = "flex gap-2";
        row.innerHTML = `
          <input type="text" class="input input-sm input-bordered flex-1" data-foreshadowing-idx="${idx}" value="" placeholder="伏笔">
          <button type="button" class="btn btn-sm btn-ghost text-error" onclick="removeForeshadowingItem(${idx})">×</button>
        `;
        container.insertBefore(row, container.lastElementChild);
      }

      function removeForeshadowingItem(idx) {
        renderForeshadowing(getForeshadowingFromUI());
      }

      function getForeshadowingFromUI() {
        const inputs = document.querySelectorAll("[data-foreshadowing-idx]");
        return Array.from(inputs)
          .map((el) => el.value)
          .filter((v) => v.trim());
      }

      function renderOther(other) {
        if (typeof other !== "object" || !other) return;
        const suggestedTitle = other.novel_title || "";
        if (suggestedTitle) {
          const suggestedDiv = document.getElementById("suggestedTitle");
          suggestedDiv.classList.remove("hidden");
          const btn = suggestedDiv.querySelector("button");
          btn.textContent = suggestedTitle;
          btn.onclick = () => {
            document.getElementById("title").value = suggestedTitle;
          };
        }
        document.getElementById("other_key_points").value =
          other.key_points || "";
        document.getElementById("other_writing_guidance").value =
          other.writing_guidance || "";
      }

      function getOtherFromUI() {
        return {
          novel_title: document.getElementById("title").value,
          key_points: document.getElementById("other_key_points").value,
          writing_guidance: document.getElementById("other_writing_guidance")
            .value,
        };
      }

      function renderOutline(outline) {
        if (!Array.isArray(outline) || outline.length === 0) return;
        const chapterCards = document.querySelectorAll(".space-y-3 > .border");
        outline.forEach((ch, idx) => {
          if (chapterCards[idx]) {
            const titleInput = chapterCards[idx].querySelector(
              'input[name="chapter_title"]',
            );
            const coreEventInput = chapterCards[idx].querySelector(
              'textarea[name="chapter_core_event"]',
            );
            if (titleInput && ch.title) titleInput.value = ch.title;
            if (coreEventInput && ch.core_event)
              coreEventInput.value = ch.core_event;
          }
        });
      }

      function applyParsedResult(parsed) {
        renderCharacterCards(parsed.characters || []);
        renderWorldView(parsed.world_view || {});
        renderStyle(parsed.style || {});
        renderForeshadowing(parsed.foreshadowing || []);
        renderOther(parsed.other || {});
        renderOutline(parsed.outline || []);

        if (parsed._raw) {
          if (parsed._raw.characters) {
            document.getElementById("characters").value =
              parsed._raw.characters;
          }
          if (parsed._raw.world_view) {
            document.getElementById("world_view").value =
              parsed._raw.world_view;
          }
          if (parsed._raw.style) {
            document.getElementById("style").value = parsed._raw.style;
          }
          if (parsed._raw.outline) {
            document.getElementById("regen-outline").value =
              parsed._raw.outline;
          }
          if (parsed._raw.foreshadowing) {
            document.getElementById("foreshadowing").value =
              parsed._raw.foreshadowing;
          }
          if (parsed._raw.other) {
            document.getElementById("other").value = parsed._raw.other;
          }
        }
      }

      function escapeHtml(str) {
        if (!str) return "";
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function manualParse() {
        const rawContent = document.getElementById("rawContent").value;
        const parsed = parseInitResult(rawContent);
        if (
          !parsed.characters?.length &&
          !parsed.world_view?.setting &&
          !parsed.style?.language_style
        ) {
          alert("解析失败，请检查内容格式是否正确");
          return;
        }
        applyParsedResult(parsed);
        alert("解析成功！");
      }

      (function () {
        const streamUrl = sessionStorage.getItem("initStreamUrl");
        const formDataStr = sessionStorage.getItem("initFormData");

        if (streamUrl && formDataStr) {
          const formData = JSON.parse(formDataStr);

          document.getElementById("streamStatus").classList.remove("hidden");

          Object.keys(formData).forEach((key) => {
            const input = document.querySelector(`input[name="${key}"]`);
            if (input) {
              input.value = formData[key];
            }
          });

          let fullContent = "";
          const rawContentEl = document.getElementById("rawContent");
          document.getElementById("rawOutput").classList.remove("hidden");

          const eventSource = new EventSource(streamUrl);

          eventSource.onmessage = function (event) {
            const data = JSON.parse(event.data);

            if (data.done) {
              document.getElementById("streamStatus").classList.add("hidden");

              const parsed = parseInitResult(fullContent);
              applyParsedResult(parsed);

              eventSource.close();
              sessionStorage.removeItem("initStreamUrl");
              sessionStorage.removeItem("initFormData");
              return;
            }

            if (data.error) {
              document.getElementById("streamStatus").className =
                "alert alert-error mb-4";
              document.getElementById("streamStatus").innerHTML =
                "<span>错误: " + data.error + "</span>";
              eventSource.close();
              return;
            }

            console.log("Received data:", data);
            if (data.content) {
              fullContent += data.content;
              rawContentEl.value = fullContent;
              rawContentEl.scrollTop = rawContentEl.scrollHeight;
            }
          };

          eventSource.onerror = function () {
            eventSource.close();
          };
        }
      })();

      function buildOutlineFromForm() {
        const chapters = [];
        const chapterCards = document.querySelectorAll(".space-y-3 > .border");
        chapterCards.forEach((card) => {
          const numInput = card.querySelector('input[name="chapter_num"]');
          const titleInput = card.querySelector('input[name="chapter_title"]');
          const coreEventInput = card.querySelector(
            'textarea[name="chapter_core_event"]',
          );
          if (numInput && titleInput) {
            chapters.push({
              chapter: parseInt(numInput.value),
              title: titleInput.value,
              core_event: coreEventInput ? coreEventInput.value : "",
            });
          }
        });
        return JSON.stringify({ outline: chapters }, null, 2);
      }

      function buildFormData() {
        const characters = getCharactersFromUI();
        const world_view = getWorldViewFromUI();
        const style = getStyleFromUI();
        const foreshadowing = getForeshadowingFromUI();
        const other = getOtherFromUI();

        document.getElementById("characters").value = JSON.stringify(
          characters,
          null,
          2,
        );
        document.getElementById("world_view").value = JSON.stringify(
          world_view,
          null,
          2,
        );
        document.getElementById("style").value = JSON.stringify(style, null, 2);
        document.getElementById("foreshadowing").value = JSON.stringify(
          foreshadowing,
          null,
          2,
        );
        document.getElementById("other").value = JSON.stringify(other, null, 2);
      }

      function validateAndSubmit() {
        const form = document.querySelector('form[action="/books"]');
        const outlineTextarea = form.querySelector('textarea[name="outline"]');
        outlineTextarea.value = buildOutlineFromForm();
        buildFormData();
        form.submit();
      }

      function regenerate() {
        const form = document.querySelector('form[action="/books/preview"]');
        const outlineInput = form.querySelector('input[name="outline"]');
        outlineInput.value = buildOutlineFromForm();
        buildFormData();
        form.submit();
      }
    </script>
  </div>
{% endblock %}
