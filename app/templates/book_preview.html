{% extends "base.html" %}
{% block content %}
  <div class="max-w-4xl mx-auto">
    <h1 class="text-2xl font-bold mb-4">预览并确认小说设定</h1>

    <form action="/books" method="post" class="space-y-4">
      <input type="hidden" name="title" value="{{ title }}" />
      <input type="hidden" name="genre" value="{{ genre }}" />
      <input
        type="hidden"
        name="target_chapters"
        value="{{ target_chapters }}"
      />
      <input type="hidden" name="basic_idea" value="{{ basic_idea }}" />
      <input type="hidden" name="temperature" value="{{ temperature }}" />
      <input type="hidden" name="top_p" value="{{ top_p }}" />
      <input type="hidden" name="max_tokens" value="{{ max_tokens }}" />
      <input type="hidden" name="stream" value="{{ 'on' if stream else '' }}" />
      <input
        type="hidden"
        name="jailbreak_prefix"
        value="{{ jailbreak_prefix }}"
      />
      <input
        type="hidden"
        name="system_template"
        value="{{ system_template }}"
      />

      <div class="card bg-base-100 shadow-xl">
        <div class="card-body">
          <h2 class="card-title">基本信息</h2>
          <div class="grid grid-cols-2 gap-4">
            <div><strong>书名：</strong>{{ title }}</div>
            <div><strong>类型：</strong>{{ genre }}</div>
            <div><strong>目标章节数：</strong>{{ target_chapters }}</div>
          </div>
          <div class="mt-2">
            <strong>初始创意：</strong>
            <div class="whitespace-pre-wrap text-sm mt-1">{{ basic_idea }}</div>
          </div>
        </div>
      </div>

      <div class="card bg-base-100 shadow-xl">
        <div class="card-body">
          <h2 class="card-title">人物卡</h2>
          <textarea
            name="characters"
            rows="6"
            class="textarea textarea-bordered"
          >
{{ characters }}</textarea
          >
        </div>
      </div>

      <div class="card bg-base-100 shadow-xl">
        <div class="card-body">
          <h2 class="card-title">世界观</h2>
          <textarea
            name="world_view"
            rows="6"
            class="textarea textarea-bordered"
          >
{{ world_view }}</textarea
          >
        </div>
      </div>

      <div class="card bg-base-100 shadow-xl">
        <div class="card-body">
          <h2 class="card-title">风格规范</h2>
          <textarea name="style" rows="4" class="textarea textarea-bordered">
{{ style }}</textarea
          >
        </div>
      </div>

      <div class="card bg-base-100 shadow-xl">
        <div class="card-body">
          <h2 class="card-title">主线大纲</h2>
          <p class="text-sm text-gray-500 mb-2">编辑每章的标题和核心事件</p>
          <div class="space-y-3">
            {% for ch in chapter_list %}
              <div class="border rounded p-3 bg-base-200">
                <div class="font-bold mb-2">第{{ ch.chapter }}章</div>
                <div class="grid grid-cols-1 gap-2">
                  <input
                    type="hidden"
                    name="chapter_num"
                    value="{{ ch.chapter }}"
                  />
                  <input
                    type="text"
                    name="chapter_title"
                    value="{{ ch.title }}"
                    placeholder="章节标题"
                    class="input input-bordered w-full"
                  />
                  <textarea
                    name="chapter_core_event"
                    rows="2"
                    placeholder="本章核心事件"
                    class="textarea textarea-bordered w-full"
                  >
{{ ch.core_event }}</textarea
                  >
                </div>
              </div>
            {% endfor %}
          </div>
          <textarea name="outline" class="hidden">{{ outline }}</textarea>
        </div>
      </div>

      <div class="card bg-base-100 shadow-xl">
        <div class="card-body">
          <h2 class="card-title">其他信息</h2>
          <textarea name="other" rows="4" class="textarea textarea-bordered">
{{ other }}</textarea
          >
        </div>
      </div>

      <div class="flex gap-4">
        <a href="/books/new" class="btn btn-outline">返回修改</a>
        <button
          type="button"
          class="btn btn-primary"
          onclick="validateAndSubmit()"
        >
          确认创建
        </button>
      </div>
    </form>

    <form action="/books/preview" method="post" class="mt-4">
      <input type="hidden" name="title" value="{{ title }}" />
      <input type="hidden" name="genre" value="{{ genre }}" />
      <input
        type="hidden"
        name="target_chapters"
        value="{{ target_chapters }}"
      />
      <input type="hidden" name="basic_idea" value="{{ basic_idea }}" />
      <input type="hidden" name="temperature" value="{{ temperature }}" />
      <input type="hidden" name="top_p" value="{{ top_p }}" />
      <input type="hidden" name="max_tokens" value="{{ max_tokens }}" />
      <input type="hidden" name="stream" value="{{ 'on' if stream else '' }}" />
      <input
        type="hidden"
        name="jailbreak_prefix"
        value="{{ jailbreak_prefix }}"
      />
      <input
        type="hidden"
        name="system_template"
        value="{{ system_template }}"
      />
      <input type="hidden" name="style" value="{{ style }}" />
      <input type="hidden" name="characters" value="{{ characters }}" />
      <input type="hidden" name="world_view" value="{{ world_view }}" />
      <input
        type="hidden"
        name="outline"
        id="regen-outline"
        value="{{ outline }}"
      />
      <input type="hidden" name="foreshadowing" value="{{ foreshadowing }}" />
      <input type="hidden" name="other" value="{{ other }}" />
      <button type="button" class="btn btn-secondary" onclick="regenerate()">
        重新生成
      </button>
    </form>

    <script>
      function buildOutlineFromForm() {
        const chapters = [];
        const chapterCards = document.querySelectorAll(".space-y-3 > .border");
        chapterCards.forEach((card) => {
          const numInput = card.querySelector('input[name="chapter_num"]');
          const titleInput = card.querySelector('input[name="chapter_title"]');
          const coreEventInput = card.querySelector(
            'textarea[name="chapter_core_event"]',
          );
          if (numInput && titleInput) {
            chapters.push({
              chapter: parseInt(numInput.value),
              title: titleInput.value,
              core_event: coreEventInput ? coreEventInput.value : "",
            });
          }
        });
        return JSON.stringify({ outline: chapters }, null, 2);
      }

      function validateAndSubmit() {
        const form = document.querySelector('form[action="/books"]');
        const outlineTextarea = form.querySelector('textarea[name="outline"]');
        outlineTextarea.value = buildOutlineFromForm();
        form.submit();
      }

      function regenerate() {
        const form = document.querySelector('form[action="/books/preview"]');
        const outlineInput = form.querySelector('input[name="outline"]');
        outlineInput.value = buildOutlineFromForm();
        form.submit();
      }
    </script>
  </div>
{% endblock %}
