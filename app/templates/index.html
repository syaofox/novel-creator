{% extends "base.html" %}
{% block content %}
  <div class="tabs tabs-boxed mb-4" id="tabs">
    <a
      class="tab {% if status != '已完结' %}tab-active{% endif %}"
      hx-get="/?status=进行中"
      hx-target="#book-list"
      hx-swap="innerHTML"
      hx-push-url="true"
      hx-on::before-request="document.getElementById('tabs').querySelectorAll('.tab').forEach(t => t.classList.remove('tab-active')); this.classList.add('tab-active')"
      >进行中</a
    >
    <a
      class="tab {% if status == '已完结' %}tab-active{% endif %}"
      hx-get="/?status=已完结"
      hx-target="#book-list"
      hx-swap="innerHTML"
      hx-push-url="true"
      hx-on::before-request="document.getElementById('tabs').querySelectorAll('.tab').forEach(t => t.classList.remove('tab-active')); this.classList.add('tab-active')"
      >已完结</a
    >
  </div>
  <div id="book-list">{% include "partials/book_list.html" %}</div>
{% endblock %}
