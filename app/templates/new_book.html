{% extends "base.html" %}
{% block content %}
  <div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold mb-4">新建小说</h1>
    <div
      id="loading"
      class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50"
    >
      <div class="text-center">
        <span class="loading loading-spinner loading-lg text-primary"></span>
        <p class="mt-2 text-white">正在初始化AI创作...</p>
      </div>
    </div>
    <form id="bookForm" class="space-y-4">
      <div class="form-control">
        <label class="label">
          <span class="label-text">书名</span>
        </label>
        <input type="text" name="title" required class="input input-bordered" />
      </div>
      <div class="form-control">
        <label class="label">
          <span class="label-text">类型（可多选）</span>
        </label>
        <div class="grid grid-cols-2 gap-2">
          <label class="label cursor-pointer justify-start gap-2">
            <input
              type="checkbox"
              name="genre"
              value="仙侠"
              class="checkbox checkbox-primary"
            />
            <span class="label-text">仙侠</span>
          </label>
          <label class="label cursor-pointer justify-start gap-2">
            <input
              type="checkbox"
              name="genre"
              value="都市"
              class="checkbox checkbox-primary"
            />
            <span class="label-text">都市</span>
          </label>
          <label class="label cursor-pointer justify-start gap-2">
            <input
              type="checkbox"
              name="genre"
              value="玄幻"
              class="checkbox checkbox-primary"
            />
            <span class="label-text">玄幻</span>
          </label>
          <label class="label cursor-pointer justify-start gap-2">
            <input
              type="checkbox"
              name="genre"
              value="悬疑"
              class="checkbox checkbox-primary"
            />
            <span class="label-text">悬疑</span>
          </label>
          <label class="label cursor-pointer justify-start gap-2">
            <input
              type="checkbox"
              name="genre"
              value="言情"
              class="checkbox checkbox-primary"
            />
            <span class="label-text">言情</span>
          </label>
          <label class="label cursor-pointer justify-start gap-2">
            <input
              type="checkbox"
              name="genre"
              value="R18"
              class="checkbox checkbox-primary"
            />
            <span class="label-text">R18</span>
          </label>
          <label class="label cursor-pointer justify-start gap-2">
            <input
              type="checkbox"
              name="genre"
              value="同人"
              class="checkbox checkbox-primary"
            />
            <span class="label-text">同人</span>
          </label>
          <label class="label cursor-pointer justify-start gap-2">
            <input
              type="checkbox"
              name="genre"
              value="二次元"
              class="checkbox checkbox-primary"
            />
            <span class="label-text">二次元</span>
          </label>
          <label class="label cursor-pointer justify-start gap-2">
            <input
              type="checkbox"
              name="genre"
              value="禁忌"
              class="checkbox checkbox-primary"
            />
            <span class="label-text">禁忌</span>
          </label>
          <label class="label cursor-pointer justify-start gap-2">
            <input
              type="checkbox"
              name="genre"
              value="其他"
              class="checkbox checkbox-primary"
            />
            <span class="label-text">其他</span>
          </label>
        </div>
      </div>
      <div class="form-control">
        <label class="label">
          <span class="label-text">目标章节数</span>
        </label>
        <input
          type="number"
          name="target_chapters"
          min="1"
          value="3"
          required
          class="input input-bordered"
        />
      </div>
      <div class="form-control" style="display: none;">
        <label class="label">
          <span class="label-text">初始创意（剧情梗概+人设）</span>
        </label>
        <textarea
          name="basic_idea"
          rows="6"
          class="textarea textarea-bordered"
          placeholder="请输入你的创意..."
        ></textarea>
      </div>

      <div class="form-control">
        <label class="label">
          <span class="label-text">初始创意</span>
        </label>
        <div class="space-y-3">
          <div>
            <label class="label py-1">
              <span class="label-text text-sm">剧情梗概</span>
              <a href="/materials?tab=plot" target="_blank" class="btn btn-xs btn-ghost">管理素材</a>
            </label>
            {% if plot_summaries %}
            <select
              id="plotSelect"
              class="select select-bordered w-full mb-2"
              onchange="loadPlotSummary()"
            >
              <option value="">-- 选择已有剧情梗概 --</option>
              {% for plot in plot_summaries %}
              <option value="{{ plot.id }}">{{ plot.title }}</option>
              {% endfor %}
            </select>
            {% endif %}
            <textarea
              id="plotSummary"
              name="plot_summary"
              rows="3"
              class="textarea textarea-bordered w-full"
              placeholder="请输入小说的剧情梗概..."
            ></textarea>
          </div>
          <div>
            <label class="label py-1">
              <span class="label-text text-sm">人物卡</span>
              <a href="/materials?tab=character" target="_blank" class="btn btn-xs btn-ghost">管理素材</a>
            </label>
            {% if character_cards %}
            <select
              id="characterSelect"
              class="select select-bordered w-full mb-2"
              onchange="loadCharacterCard()"
            >
              <option value="">-- 选择已有的人物卡 --</option>
              {% for card in character_cards %}
              <option value="{{ card.id }}">{{ card.title }}</option>
              {% endfor %}
            </select>
            {% endif %}
            <textarea
              id="characterCard"
              name="character_card"
              rows="3"
              class="textarea textarea-bordered w-full"
              placeholder="请输入主要人物设定..."
            ></textarea>
          </div>
          <div>
            <label class="label py-1">
              <span class="label-text text-sm">注意事项</span>
              <a href="/materials?tab=note" target="_blank" class="btn btn-xs btn-ghost">管理素材</a>
            </label>
            {% if material_notes %}
            <select
              id="noteSelect"
              class="select select-bordered w-full mb-2"
              onchange="loadMaterialNote()"
            >
              <option value="">-- 选择已有注意事项 --</option>
              {% for note in material_notes %}
              <option value="{{ note.id }}">{{ note.title }}</option>
              {% endfor %}
            </select>
            {% endif %}
            <textarea
              id="materialNote"
              name="notes"
              rows="3"
              class="textarea textarea-bordered w-full"
              placeholder="请输入需要注意的事项..."
            ></textarea>
          </div>
        </div>
      </div>
      <div class="form-control">
        <label class="label">
          <span class="label-text">写作风格规范</span>
          <a href="/materials?tab=style" target="_blank" class="btn btn-xs btn-ghost">管理素材</a>
        </label>
        <select
          id="styleSelect"
          class="select select-bordered w-full mb-2"
          onchange="updateStyleFromSelect()"
        >
          <option value="">-- 选择已有文风 --</option>
          {% for style in writing_styles %}
          <option value="{{ style.id }}">{{ style.title }}{% if style.is_default %} (默认){% endif %}</option>
          {% endfor %}
          {% for name, content in style_presets.items() %}
          <option value="{{ name }}">{{ name }} (预设)</option>
          {% endfor %}
        </select>
        <textarea
          id="styleTextarea"
          name="style"
          rows="4"
          class="textarea textarea-bordered"
          placeholder="选择预设风格或手动输入自定义风格规范..."
        >{{ default_style }}</textarea>
      </div>

      <div class="divider">参数设置（可选）</div>

      <div class="form-control">
        <label class="label">
          <span class="label-text">Temperature</span>
        </label>
        <input
          type="range"
          name="temperature"
          min="0"
          max="2"
          step="0.01"
          value="{{ default_temperature }}"
          class="range range-primary"
        />
        <div class="flex justify-between text-xs px-2">
          <span>0</span>
          <span>1</span>
          <span>2</span>
        </div>
      </div>
      <div class="form-control">
        <label class="label">
          <span class="label-text">Top P</span>
        </label>
        <input
          type="number"
          name="top_p"
          min="0"
          max="1"
          step="0.01"
          value="{{ default_top_p }}"
          class="input input-bordered"
        />
      </div>
      <div class="form-control">
        <label class="label">
          <span class="label-text">Max Tokens</span>
        </label>
        <input
          type="number"
          name="max_tokens"
          min="1"
          max="32768"
          value="{{ default_max_tokens }}"
          class="input input-bordered"
        />
      </div>
      <div class="form-control">
        <label class="label cursor-pointer">
          <span class="label-text">流式输出</span>
          <input
            type="checkbox"
            name="stream"
            checked
            class="toggle toggle-primary"
          />
        </label>
      </div>
      <div class="form-control">
        <label class="label">
          <span class="label-text">破限前缀</span>
        </label>
        <textarea
          name="jailbreak_prefix"
          rows="3"
          class="textarea textarea-bordered"
        >{{ jailbreak_prefix }}</textarea>
      </div>
      <div class="form-control">
        <label class="label">
          <span class="label-text"
            >系统模板（可使用 {memory} {style} 占位符）</span
          >
        </label>
        <textarea
          name="system_template"
          rows="4"
          class="textarea textarea-bordered"
        >{{ system_template }}</textarea>
      </div>

      <div class="form-control mt-6">
        <button
          type="button"
          class="btn btn-primary"
          onclick="goToPreview()"
        >
          开始初始化
        </button>
      </div>
    </form>
  </div>

  <script>
    const stylePresets = {{ style_presets | tojson }};
    const plotSummaries = {{ plot_summaries | tojson }};
    const characterCards = {{ character_cards | tojson }};
    const writingStyles = {{ writing_styles | tojson }};
    const materialNotes = {{ material_notes | tojson }};

    function loadPlotSummary() {
      const select = document.getElementById("plotSelect");
      const textarea = document.getElementById("plotSummary");
      const selectedId = select.value;
      
      if (!selectedId) return;
      
      const plot = plotSummaries.find(p => p.id === parseInt(selectedId));
      if (plot && plot.content) {
        textarea.value = plot.content;
      }
    }

    function loadCharacterCard() {
      const select = document.getElementById("characterSelect");
      const textarea = document.getElementById("characterCard");
      const selectedId = select.value;
      
      if (!selectedId) return;
      
      const card = characterCards.find(c => c.id === parseInt(selectedId));
      if (card && card.content) {
        if (textarea.value) {
          textarea.value += "\n" + card.content;
        } else {
          textarea.value = card.content;
        }
      }
    }

    function loadMaterialNote() {
      const select = document.getElementById("noteSelect");
      const textarea = document.getElementById("materialNote");
      const selectedId = select.value;
      
      if (!selectedId) return;
      
      const note = materialNotes.find(n => n.id === parseInt(selectedId));
      if (note && note.content) {
        textarea.value = note.content;
      }
    }

    function updateStyleFromSelect() {
      const select = document.getElementById("styleSelect");
      const textarea = document.getElementById("styleTextarea");
      const selectedValue = select.value;

      if (!selectedValue) return;

      // Check if it's a saved style
      const savedStyle = writingStyles.find(s => s.id === parseInt(selectedValue));
      if (savedStyle) {
        textarea.value = savedStyle.content;
        return;
      }

      // Check if it's a preset
      if (stylePresets[selectedValue]) {
        textarea.value = stylePresets[selectedValue];
      }
    }

    function goToPreview() {
      const form = document.getElementById("bookForm");
      const formData = new FormData(form);

      const plotSummary = formData.get("plot_summary") || "";
      const characterCard = formData.get("character_card") || "";
      const notes = formData.get("notes") || "";

      const basicIdea = [
        plotSummary ? `剧情梗概:${plotSummary}` : "",
        characterCard ? `人物卡:${characterCard}` : "",
        notes ? `注意事项:${notes}` : "",
      ]
        .filter(Boolean)
        .join("\n");

      const genre = formData.getAll("genre");
      const genreStr = genre.join(", ");

      const params = new URLSearchParams();
      params.append("title", formData.get("title") || "");
      params.append("basic_idea", basicIdea);
      params.append("target_chapters", formData.get("target_chapters") || "3");
      params.append("jailbreak_prefix", formData.get("jailbreak_prefix") || "");
      params.append("style", formData.get("style") || "");
      params.append("temperature", formData.get("temperature") || "{{ default_temperature }}");
      params.append("top_p", formData.get("top_p") || "{{ default_top_p }}");
      params.append("max_tokens", formData.get("max_tokens") || "{{ default_max_tokens }}");
      params.append("stream", formData.get("stream") ? "true" : "false");
      params.append("system_template", formData.get("system_template") || "");
      genre.forEach((g) => params.append("genre", g));

      const streamUrl = "/books/init-stream?" + params.toString();

      sessionStorage.setItem("initStreamUrl", streamUrl);
      sessionStorage.setItem("initFormData", JSON.stringify({
        title: formData.get("title") || "",
        genre: genreStr,
        target_chapters: parseInt(formData.get("target_chapters") || "3"),
        basic_idea: basicIdea,
        temperature: parseFloat(formData.get("temperature") || "{{ default_temperature }}"),
        top_p: parseFloat(formData.get("top_p") || "{{ default_top_p }}"),
        max_tokens: parseInt(formData.get("max_tokens") || "{{ default_max_tokens }}"),
        stream: formData.get("stream") ? true : false,
        jailbreak_prefix: formData.get("jailbreak_prefix") || "",
        system_template: formData.get("system_template") || "",
        style: formData.get("style") || "",
      }));

      window.location.href = "/books/preview?" + params.toString();
    }
  </script>
{% endblock %}
