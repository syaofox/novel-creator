{% extends "base.html" %}
{% block content %}
  <div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold mb-4">全局设置</h1>
    <form action="/settings/global" method="post" class="space-y-4">
      <div class="divider">API 配置</div>
      <div class="form-control">
        <label class="label">
          <span class="label-text">DeepSeek API Key</span>
        </label>
        <input
          type="password"
          name="deepseek_api_key"
          value="{{ config.deepseek_api_key }}"
          class="input input-bordered"
        />
      </div>
      <div class="form-control">
        <label class="label">
          <span class="label-text">API Base URL</span>
        </label>
        <input
          type="text"
          name="deepseek_base_url"
          value="{{ config.deepseek_base_url }}"
          class="input input-bordered"
        />
      </div>
      <div class="form-control">
        <label class="label">
          <span class="label-text">默认模型</span>
        </label>
        <select name="default_model" class="select select-bordered">
          <option
            value="deepseek-reasoner"
            {% if config.default_model == 'deepseek-reasoner' %}selected{% endif %}
          >
            deepseek-reasoner
          </option>
          <option
            value="deepseek-chat"
            {% if config.default_model == 'deepseek-chat' %}selected{% endif %}
          >
            deepseek-chat
          </option>
        </select>
      </div>

      <div class="divider">AI 写作参数</div>
      <div class="form-control">
        <label class="label">
          <span class="label-text">Temperature (0-2)</span>
        </label>
        <input
          type="range"
          name="temperature"
          min="0"
          max="2"
          step="0.01"
          value="{{ config.temperature }}"
          class="range range-primary"
        />
        <span class="text-sm text-base-content/60"
          >{{ config.temperature }}</span
        >
      </div>
      <div class="form-control">
        <label class="label">
          <span class="label-text">Top P (0-1)</span>
        </label>
        <input
          type="number"
          name="top_p"
          min="0"
          max="1"
          step="0.01"
          value="{{ config.top_p }}"
          class="input input-bordered"
        />
      </div>
      <div class="form-control">
        <label class="label">
          <span class="label-text">Max Tokens</span>
        </label>
        <input
          type="number"
          name="max_tokens"
          min="1"
          max="32768"
          value="{{ config.max_tokens }}"
          class="input input-bordered"
        />
      </div>
      <div class="form-control">
        <label class="label cursor-pointer">
          <span class="label-text">流式输出</span>
          <input
            type="checkbox"
            name="stream"
            {% if config.stream %}checked{% endif %}
            class="toggle toggle-primary"
          />
        </label>
      </div>
      <div class="form-control">
        <label class="label">
          <span class="label-text">系统前缀提示词</span>
        </label>
        <textarea
          name="jailbreak_prefix"
          rows="4"
          class="textarea textarea-bordered"
        >
{{ config.jailbreak_prefix }}</textarea
        >
      </div>
      <div class="form-control">
        <label class="label">
          <span class="label-text">系统模板</span>
        </label>
        <textarea
          name="system_template"
          rows="6"
          class="textarea textarea-bordered"
        >
{{ config.system_template }}</textarea
        >
      </div>

      <div class="form-control mt-6">
        <button type="submit" class="btn btn-primary">保存</button>
        <a href="/" class="btn btn-ghost">返回首页</a>
      </div>
    </form>
  </div>
{% endblock %}
