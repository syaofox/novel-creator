{% extends "base.html" %}
{% block content %}
  <div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold mb-4">全局设置</h1>
    <form action="/settings/global" method="post" class="space-y-4">
      <div class="divider">API 配置</div>
      <div class="form-control">
        <label class="label">
          <span class="label-text">DeepSeek API Key</span>
        </label>
        <input
          type="password"
          name="deepseek_api_key"
          value="{{ config.deepseek_api_key }}"
          class="input"
        />
      </div>
      <div class="form-control">
        <label class="label">
          <span class="label-text">API Base URL</span>
        </label>
        <input
          type="text"
          name="deepseek_base_url"
          value="{{ config.deepseek_base_url }}"
          class="input"
        />
      </div>
      <div class="divider">AI Agent 模型配置</div>
      {% for agent_name, agent_label in {
        'chapter_writer': '章节写作',
        'summary': '摘要更新',
        'init_book': '书籍初始化',
        'style_extractor': '风格提取',
      }.items() %}
      <div class="form-control">
        <label class="label">
          <span class="label-text">{{ agent_label }}</span>
        </label>
        <select name="agent_model_{{ agent_name }}" class="select">
          <option value="">默认（deepseek-v4-flash）</option>
          <option value="deepseek-v4-flash" {% if config.agent_models.get(agent_name) == 'deepseek-v4-flash' %}selected{% endif %}>deepseek-v4-flash（快速模式）</option>
          <option value="deepseek-v4-pro" {% if config.agent_models.get(agent_name) == 'deepseek-v4-pro' %}selected{% endif %}>deepseek-v4-pro（推荐，思考模式）</option>
        </select>
      </div>
      {% endfor %}

      <div class="divider">AI 写作参数</div>
      <div class="form-control">
        <label class="label">
          <span class="label-text">Temperature (0-2)</span>
        </label>
        <input
          type="range"
          name="temperature"
          min="0"
          max="2"
          step="0.01"
          value="{{ config.temperature }}"
          class="range"
        />
        <span class="text-sm text-base-content/60"
          >{{ config.temperature }}</span
        >
      </div>
      <div class="form-control">
        <label class="label">
          <span class="label-text">Top P (0-1)</span>
        </label>
        <input
          type="number"
          name="top_p"
          min="0"
          max="1"
          step="0.01"
          value="{{ config.top_p }}"
          class="input"
        />
      </div>
      <div class="form-control">
        <label class="label">
          <span class="label-text">Max Tokens</span>
        </label>
        <input
          type="number"
          name="max_tokens"
          min="1"
          max="384000"
          value="{{ config.max_tokens }}"
          class="input"
        />
      </div>
      <div class="form-control">
        <label class="label cursor-pointer">
          <span class="label-text">流式输出</span>
          <input
            type="checkbox"
            name="stream"
            {% if config.stream %}checked{% endif %}
            class="toggle"
          />
        </label>
      </div>
      <div class="form-control">
        <label class="label">
          <span class="label-text">系统前缀提示词</span>
        </label>
        <textarea
          name="jailbreak_prefix"
          rows="4"
          class="textarea"
        >
{{ config.jailbreak_prefix }}</textarea
        >
      </div>
      <div class="form-control">
        <label class="label">
          <span class="label-text">系统模板</span>
        </label>
        <textarea
          name="system_template"
          rows="6"
          class="textarea"
        >
{{ config.system_template }}</textarea
        >
      </div>

      <div class="form-control mt-6">
        <button type="submit" class="btn btn-primary">保存</button>
        <a href="/" class="btn btn-ghost">返回首页</a>
      </div>
    </form>
  </div>
{% endblock %}
